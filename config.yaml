model:
  # HuggingFace base model to fine-tune
  base: Qwen/Qwen3.5-9B
  # Short name used for output directories and Ollama model name
  name: qwen35-9b-clawd

paths:
  # Root workspace — override with PBM_WORKSPACE env var
  # Defaults to ./workspace so the project runs anywhere without RunPod
  workspace: ${PBM_WORKSPACE:-./workspace}

benchmark:
  name: pinchbench
  total_tasks: 23

data:
  examples_per_task: 70       # target examples per task in training set
  val_split: 0.1              # fraction held out for validation
  min_judge_score: 3          # filter examples below this quality score (1-5)

training:
  epochs: 3
  batch_size: 2
  grad_accum: 4               # effective batch = batch_size * grad_accum
  learning_rate: 2e-4
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  max_seq_len: 4096
  warmup_ratio: 0.05
  lr_scheduler: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0

convert:
  quantization: q4_k_m        # q4_k_m (default), q8_0 (higher quality), f16 (no quant)

# Claude models used for data generation, judging, and analysis
# Override these to use different models (e.g. claude-opus-4-5 for higher quality)
claude:
  generation: claude-sonnet-4-5   # generate.py, topup.py — synthetic data generation
  judge: claude-sonnet-4-5        # llm_judge.py — quality scoring
  analysis: claude-sonnet-4-6     # eval_analysis_agent.py — failure diagnosis

loop:
  max_iterations: 2           # increase after verifying the loop works correctly
  target_score: 0.85          # stop when benchmark score exceeds this
  weak_task_threshold: 0.50   # tasks below this get more synthetic data each iteration
  max_new_per_task: 50        # max NEW examples per task per iteration (score-0 gets this many)
  max_total_per_task: 120     # hard cap: rebalance trims any task above this before training
  total_new_examples_cap: 300 # max total new examples per iteration

# HuggingFace dataset repo for versioned data snapshots
# CuratorAgent auto-pushes after each curation pass.
# Set HF_TOKEN env var or run: huggingface-cli login
huggingface:
  dataset_repo: ChetanTekur/pinchbench-clawd
